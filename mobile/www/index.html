<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OMR Maker</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #f8fafc; color: #0f172a;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px; text-align: center;
    }
    .mark {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(150deg, #4f46e5, #8b5cf6);
      display: grid; place-items: center;
      box-shadow: 0 16px 34px -12px rgba(79,70,229,.55);
    }
    h1 { font-size: 20px; font-weight: 800; margin: 4px 0 0; letter-spacing: -.02em; }
    p { margin: 0; font-size: 13.5px; color: #64748b; line-height: 1.5; max-width: 30ch; }
    code {
      padding: 10px 13px; border-radius: 10px; background: #0f172a; color: #e2e8f0;
      font: 700 13px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="mark">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3" />
      <circle cx="8" cy="9" r="1.6" fill="#fff" stroke="none" />
      <circle cx="8" cy="15" r="1.6" />
      <path d="M12 9h5M12 15h5" />
    </svg>
  </div>
  <h1>OMR Maker</h1>
  <p>Android 개발 셸이 준비되었습니다. USB 디버깅 기기를 Windows PC에 연결한 뒤 아래 명령을 실행하세요.</p>
  <code>npm run android:dev</code>
  <!--
    This checked-in page deliberately contains no remote server URL. Capacitor's
    live-reload command supplies a temporary development URL at run time.
  -->
</body>
</html>
