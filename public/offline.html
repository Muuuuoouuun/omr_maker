<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>OMR Maker 오프라인</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      }
      img {
        width: 56px;
        height: 56px;
        object-fit: contain;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
      .actions {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }
      .offline-action {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 1px solid #bfdbfe;
        border-radius: 12px;
        background: #eff6ff;
        color: #1e40af;
        font: inherit;
        font-weight: 800;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        touch-action: manipulation;
      }
      .offline-action.primary {
        border-color: transparent;
        background: #2563eb;
        color: #fff;
      }
      button.offline-action {
        width: 100%;
        min-height: 44px;
      }
      .offline-action:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.32);
        outline-offset: 3px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f172a;
          color: #f1f5f9;
        }
        main {
          background: #1e293b;
          border-color: #334155;
        }
        p {
          color: #cbd5e1;
        }
        .offline-action {
          border-color: #334155;
          background: #0f172a;
          color: #bfdbfe;
        }
        .offline-action.primary {
          border-color: transparent;
          background: #60a5fa;
          color: #0f172a;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="" />
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결이 복구되면 OMR Maker가 다시 시험과 리포트를 불러옵니다. 이 기기에 저장된 페이지는 계속 열릴 수 있습니다.</p>
      <nav class="actions" aria-label="오프라인 빠른 이동">
        <a class="offline-action primary" href="/">홈으로</a>
        <a class="offline-action" href="/pwa-check">앱 상태 체크</a>
        <button class="offline-action" type="button" onclick="window.location.reload()">다시 연결 시도</button>
      </nav>
    </main>
  </body>
</html>
