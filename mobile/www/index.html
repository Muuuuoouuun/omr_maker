<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OMR Maker</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #f8fafc; color: #0f172a;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px; text-align: center;
    }
    .mark {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(150deg, #4f46e5, #8b5cf6);
      display: grid; place-items: center;
      box-shadow: 0 16px 34px -12px rgba(79,70,229,.55);
    }
    h1 { font-size: 20px; font-weight: 800; margin: 4px 0 0; letter-spacing: -.02em; }
    p { margin: 0; font-size: 13.5px; color: #64748b; line-height: 1.5; max-width: 30ch; }
    .spinner {
      width: 26px; height: 26px; border-radius: 50%;
      border: 3px solid #e2e8f0; border-top-color: #4f46e5;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 2s; } }
  </style>
</head>
<body>
  <div class="mark">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3" />
      <circle cx="8" cy="9" r="1.6" fill="#fff" stroke="none" />
      <circle cx="8" cy="15" r="1.6" />
      <path d="M12 9h5M12 15h5" />
    </svg>
  </div>
  <h1>OMR Maker</h1>
  <div class="spinner" role="status" aria-label="불러오는 중"></div>
  <p>앱을 불러오는 중입니다. 잠시만 기다려주세요.</p>
  <!--
    This is the Capacitor webDir fallback. In normal use the native shell loads
    the live app from `server.url` (see capacitor.config.ts). This splash is only
    shown briefly, or if the configured server is unreachable.
  -->
</body>
</html>
