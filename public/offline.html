<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>OMR Maker 오프라인</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f172a;
          color: #f1f5f9;
        }
        main {
          background: #1e293b;
          border-color: #334155;
        }
        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결이 복구되면 OMR Maker가 다시 시험과 리포트를 불러옵니다. 이 기기에 저장된 페이지는 계속 열릴 수 있습니다.</p>
    </main>
  </body>
</html>
